<section class="registration-module">

    <h2>Baggage Registration</h2>

    <form id="registrationForm">

        <input
            type="text"
            placeholder="Passenger Name"
        >

        <input
            type="text"
            placeholder="Flight Number"
        >

        <input
            type="text"
            placeholder="Destination"
        >

        <button type="submit">
            Register Bag
        </button>

    </form>

</section>
