    <main class="page-main"><section class="section-shell page-header"><p class="eyebrow"><i class="fa-solid fa-file-circle-exclamation"></i> Lost baggage report</p><h1>Create a passenger support claim.</h1><p class="hero-copy">A dedicated page for collecting passenger contact information, baggage ID and issue notes.</p></section><section class="section-shell no-top-padding narrow-section"><form class="lost-form glass-card" id="lostForm"><label>Passenger Email<input id="passengerEmail" type="email" placeholder="passenger@example.com" required /></label><label>Bag ID<input id="lostBag" type="text" placeholder="BG1024" required /></label><label>Issue Notes<textarea id="lostNotes" rows="5" placeholder="Describe the baggage issue"></textarea></label><button class="primary-btn" type="submit"><i class="fa-solid fa-paper-plane"></i> Submit Claim</button><p class="form-note" id="lostMessage" role="status"></p></form></section></main>
