<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Tracking | SmartTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/animation.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
    <div class="orb orb-one" aria-hidden="true"></div><div class="orb orb-two" aria-hidden="true"></div><div class="noise" aria-hidden="true"></div>
    <nav class="navbar" aria-label="Primary navigation">
        <a class="logo" href="../index.html"><span class="logo-mark"><i class="fa-solid fa-plane-departure"></i></span><span>SmartTrack</span></a>
        <button class="nav-toggle" id="navToggle" type="button" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
        <ul class="nav-links" id="navLinks">
            <li><a href="dashboard.html">Dashboard</a></li><li><a class="active" href="tracking.html">Tracking</a></li><li><a href="risk.html">Risk AI</a></li><li><a href="analytics.html">Analytics</a></li><li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>
    <main class="page-main">
        <section class="section-shell page-header">
            <p class="eyebrow"><i class="fa-solid fa-location-crosshairs"></i> Live baggage tracking</p>
            <h1>Search baggage by ID or flight.</h1>
            <p class="hero-copy">Use sample IDs BG1024, BG2048, BG4096, BG8192 or flight AI-202 to view live status and journey checkpoints.</p>
        </section>
        <section class="section-shell split-section no-top-padding">
            <div class="tracking-workspace">
                <div class="search-panel" id="tracking">
                    <label for="bagInput">Baggage ID or flight number</label>
                    <div class="search-row"><input id="bagInput" type="text" placeholder="Try BG1024 or AI-202" autocomplete="off" /><button class="primary-btn" id="trackBtn" type="button"><i class="fa-solid fa-magnifying-glass-location"></i> Analyse Bag</button></div>
                    <div class="quick-chips" aria-label="Sample baggage IDs"><button type="button" data-bag="BG1024">BG1024</button><button type="button" data-bag="BG2048">BG2048</button><button type="button" data-bag="BG4096">BG4096</button><button type="button" data-bag="BG8192">BG8192</button></div>
                </div>
                <div class="status-card glass-card" id="resultCard" aria-live="polite"></div>
            </div>
            <div class="timeline glass-card" id="timelineList"></div>
        </section>
    </main>
    <footer class="footer"><span>© 2026 SmartTrack</span><span>Tracking module</span></footer>
    <script src="../js/app.js" defer></script>
</body>
</html>
